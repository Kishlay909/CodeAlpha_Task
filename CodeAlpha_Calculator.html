<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, hsl(222, 47%, 11%), #1e1b4b);
            color: #fff;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 340px;
        }

        .display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .previous-operand {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            min-height: 20px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .current-operand {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 600;
            word-wrap: break-word;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        
        button.operator {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        button.operator:hover {
            background: rgba(99, 102, 241, 0.4);
        }

        button.clear {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            grid-column: span 2;
        }

        button.clear:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        button.equals {
            background: #4f46e5;
            color: white;
            grid-column: span 2;
        }

        button.equals:hover {
            background: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div id="previous" class="previous-operand"></div>
            <div id="current" class="current-operand">0</div>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearAll()">AC</button>
            <button class="operator" onclick="chooseOperator('÷')">÷</button>
            <button class="operator" onclick="chooseOperator('×')">×</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="chooseOperator('-')">-</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="chooseOperator('+')">+</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendNumber('.')">.</button>
            
            <button onclick="appendNumber('0')">0</button>
            <button class="equals" onclick="compute()">=</button>
        </div>
    </div>

    <script>
    
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;

        const currentDisplay = document.getElementById('current');
        const previousDisplay = document.getElementById('previous');

        function updateDisplay() {
            currentDisplay.innerText = currentOperand;
            if (operation != null) {
                previousDisplay.innerText = `${previousOperand} ${operation}`;
            } else {
                previousDisplay.innerText = '';
            }
        }

        function clearAll() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            updateDisplay();
        }

        function appendNumber(number) {
            if (number === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number.toString();
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
            updateDisplay();
        }

        function chooseOperator(selectedOperation) {
            if (currentOperand === '') return;
            if (previousOperand !== '') {
                compute();
            }
            operation = selectedOperation;
            previousOperand = currentOperand;
            currentOperand = '0';
            updateDisplay();
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '×':
                    computation = prev * current;
                    break;
                case '÷':
                    if (current === 0) {
                        alert("Cannot divide by zero!");
                        clearAll();
                        return;
                    }
                    computation = prev / current;
                    break;
                default:
                    return;
            }

            // Fix potential floating point issues (e.g., 0.1 + 0.2)
            currentOperand = parseFloat(computation.toFixed(8)).toString();
            operation = undefined;
            previousOperand = '';
            updateDisplay();
        }

        window.addEventListener('keydown', e => {
            if (e.key >= 0 && e.key <= 9 || e.key === '.') {
                appendNumber(e.key);
            }
            if (e.key === '+') chooseOperator('+');
            if (e.key === '-') chooseOperator('-');
            if (e.key === '*') chooseOperator('×');
            if (e.key === '/') {
                e.preventDefault(); 
                chooseOperator('÷');
            }
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                compute();
            }
            if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearAll();
            }
            if (e.key === 'Backspace') {
                if (currentOperand.length > 1) {
                    currentOperand = currentOperand.slice(0, -1);
                } else {
                    currentOperand = '0';
                }
                updateDisplay();
            }
        });
    </script>
</body>
</html>
